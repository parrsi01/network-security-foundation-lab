name: CI

on:
  push:
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate repository
        run: ./validate_repo.sh --quick
      - name: Unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

